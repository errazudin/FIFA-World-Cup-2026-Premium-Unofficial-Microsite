                        'float': 'float 6s ease-in-out infinite',
                        'pulse-glow': 'pulseGlow 2s infinite ease-in-out',
                        'scan': 'scan 4s linear infinite',
                    },
                    keyframes: {
                        shimmer: {
                            '0%': { backgroundPosition: '-200% 0' },
                            '100%': { backgroundPosition: '200% 0' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        pulseGlow: {
                            '0%, 100%': { opacity: 0.3 },
                            '50%': { opacity: 0.8 },
                        },
                        scan: {
                            '0%': { top: '0%' },
                            '50%': { top: '100%' },
                            '100%': { top: '0%' },
                        }
                    }
                }

            --gradient-start: #0F172A;
            --gradient-end: #090D1A;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Premium Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--panel-border);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #F59E0B;
        }

        /* Glassmorphism Classes with Dynamic Theme Fallbacks */
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        .glow-cyan {
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.15);
        }
        .glow-pink {
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.15);
        }
        .glow-gold {
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.15);
        }

        /* Ambient Glow Blob opacity levels */
        .glow-blob {
            transition: opacity 0.5s ease;
            opacity: 0.09;
        }
        .dark .glow-blob {
            opacity: 0.18;
        }
    </style>
</head>

        function App() {
            const [matches, setMatches] = useState(INITIAL_MATCHES);
            const [selectedGroup, setSelectedGroup] = useState("A");
            const [stadiumFilter, setStadiumFilter] = useState("ALL");
            const [searchTeam, setSearchTeam] = useState("");
            const [favoriteTeam, setFavoriteTeam] = useState("USA");
            const [fanName, setFanName] = useState("Future Legend");
            const [fanTitle, setFanTitle] = useState("Tactical Expert");
            const [ticketTier, setTicketTier] = useState("Holographic");
            const [currentTab, setCurrentTab] = useState("live");
            
            const [theme, setTheme] = useState("dark");
            const [language, setLanguage] = useState("en");
            
            /* Simulated Time synced precisely to Sunday, June 14, 2026, 19:07:50 */
            const [currentTime, setCurrentTime] = useState(new Date("2026-06-14T19:07:50"));

            const [toast, setToast] = useState({ show: false, title: "", message: "", type: "success" });

            useEffect(() => {
                const interval = setInterval(() => {
                    setCurrentTime(prev => new Date(prev.getTime() + 1000));
                }, 1000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                const htmlEl = document.documentElement;
                if (theme === "dark") {
                    htmlEl.classList.add("dark");
                    htmlEl.classList.remove("light-theme");
                } else {
                    htmlEl.classList.remove("dark");
                    htmlEl.classList.add("light-theme");
                }
            }, [theme]);

            const t = useMemo(() => TRANSLATIONS[language] || TRANSLATIONS.en, [language]);

            const showNotificationToast = (title, message, type = "success") => {
                setToast({ show: true, title, message, type });
                setTimeout(() => {
                    setToast(prev => ({ ...prev, show: false }));
                }, 5000);
            };

            const handleBadgeAction = () => {
                const roleTranslation = t.roles[fanTitle] || fanTitle;
                const messageText = `${t.fanName}: ${fanName} | ${t.supporterRole}: ${roleTranslation} | ${t.supportedTeam}: ${TEAM_INFO[favoriteTeam].name} ${TEAM_INFO[favoriteTeam].flag} | Tier: ${ticketTier}`;
                showNotificationToast(t.ticketGenerated, messageText, "success");
            };

            const formattedTimezone = useMemo(() => {
                const offsetMinutes = currentTime.getTimezoneOffset();
                const sign = offsetMinutes <= 0 ? "+" : "-";
                const absMinutes = Math.abs(offsetMinutes);
                const hours = String(Math.floor(absMinutes / 60)).padStart(2, "0");
                const mins = String(absMinutes % 60).padStart(2, "0");
                return `UTC ${sign}${hours}:${mins}`;
            }, [currentTime]);

            const getLocalTimeStr = (matchDateStr, matchTimeStr, offsetStr) => {
                const isoString = `${matchDateStr}T${matchTimeStr}:00${offsetStr}`;
                try {
                    const d = new Date(isoString);
                    if (isNaN(d.getTime())) return matchTimeStr;
                    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });
                } catch (e) {
                    return matchTimeStr;
                }
            };

            const computedMatches = useMemo(() => {
                return matches.map(match => {
                    const kickoff = new Date(`${match.date}T${match.localTime}:00${match.offset}`);
                    const diffMs = currentTime.getTime() - kickoff.getTime();
                    const durationMs = 105 * 60 * 1000; // 105 minutes match duration

                    let status = match.status; 
                    if (match.actualScore1 !== undefined && match.actualScore2 !== undefined) {
                        // Official results are fully locked
                        status = "FT";
                    } else if (diffMs > durationMs) {
                        status = "FT";
                    } else if (diffMs > 0) {
                        status = "LIVE";
                    } else {
                        status = "UPCOMING";
                    }

                    return {
                        ...match,
                        status
                    };
                });
            }, [matches, currentTime]);

            const matchdayRecaps = useMemo(() => {
                return computedMatches.filter(m => m.status === "FT");
            }, [computedMatches]);

            const activeKickoffs = useMemo(() => {
                return computedMatches.filter(m => m.status !== "FT");
            }, [computedMatches]);

            const predictionPoints = useMemo(() => {
                let totalPoints = 0;
                let correctOutcomes = 0;
                let perfectScores = 0;

                computedMatches.forEach(m => {
                    if (m.status === "FT" && m.score1 !== null && m.score2 !== null) {
                        const actualS1 = m.actualScore1 !== undefined ? m.actualScore1 : 0;
                        const actualS2 = m.actualScore2 !== undefined ? m.actualScore2 : 0;
                        const predS1 = parseInt(m.score1);
                        const predS2 = parseInt(m.score2);

                        if (!isNaN(predS1) && !isNaN(predS2)) {
                            const actualWin = actualS1 > actualS2 ? 1 : actualS1 < actualS2 ? -1 : 0;
                            const predWin = predS1 > predS2 ? 1 : predS1 < predS2 ? -1 : 0;

                            if (actualS1 === predS1 && actualS2 === predS2) {
                                totalPoints += 3;
                                perfectScores += 1;
                                correctOutcomes += 1;
                            } else if (actualWin === predWin) {
                                totalPoints += 1;
                                correctOutcomes += 1;
                            }
                        }
                    }
                });

                return { totalPoints, correctOutcomes, perfectScores };
            }, [computedMatches]);

            const groupStandings = useMemo(() => {
                const standings = {};

                Object.keys(TEAM_INFO).forEach(code => {
                    const group = TEAM_INFO[code].group;
                    if (!standings[group]) standings[group] = {};
                    standings[group][code] = {
                        code,
                        name: TEAM_INFO[code].name,
                        flag: TEAM_INFO[code].flag,
                        mp: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, pts: 0
                    };
                });

                computedMatches.forEach(m => {
                    const g = m.group;
                    const t1 = m.team1;
                    const t2 = m.team2;
                    
                    const isCompleted = m.status === "FT";
                    const s1 = isCompleted ? (m.actualScore1 !== undefined ? m.actualScore1 : m.score1) : (m.score1 !== null ? parseInt(m.score1) : null);
                    const s2 = isCompleted ? (m.actualScore2 !== undefined ? m.actualScore2 : m.score2) : (m.score2 !== null ? parseInt(m.score2) : null);

                    if (s1 !== null && s2 !== null && !isNaN(s1) && !isNaN(s2)) {
                        const team1Stats = standings[g][t1];
                        const team2Stats = standings[g][t2];

                        if (team1Stats && team2Stats) {
                            team1Stats.mp += 1;
                            team2Stats.mp += 1;
                            team1Stats.gf += s1;
                            team1Stats.ga += s2;
                            team2Stats.gf += s2;
                            team2Stats.ga += s1;
                            team1Stats.gd = team1Stats.gf - team1Stats.ga;
                            team2Stats.gd = team2Stats.gf - team2Stats.ga;

                            if (s1 > s2) {
                                team1Stats.w += 1;
                                team1Stats.pts += 3;
                                team2Stats.l += 1;
                            } else if (s1 < s2) {
                                team2Stats.w += 1;
                                team2Stats.pts += 3;
                                team1Stats.l += 1;
                            } else {
                                team1Stats.d += 1;
                                team1Stats.pts += 1;
                                team2Stats.d += 1;
                                team2Stats.pts += 1;
                            }
                        }
                    }
                });

                const sortedStandings = {};
                Object.keys(standings).forEach(g => {
                    sortedStandings[g] = Object.values(standings[g]).sort((a, b) => {
                        if (b.pts !== a.pts) return b.pts - a.pts;
                        if (b.gd !== a.gd) return b.gd - a.gd;
                        return b.gf - a.gf;
                    });
                });

                return sortedStandings;
            }, [computedMatches]);

            const updateScore = (matchId, isTeam1, value) => {
                const targetMatch = computedMatches.find(m => m.id === matchId);
                if (targetMatch && targetMatch.status === "FT") {
                    return; // Prevent updating completed/verified matches
                }

                const parsedVal = value === "" ? null : parseInt(value);
                setMatches(prev => prev.map(m => {
                    if (m.id === matchId) {
                        return {
                            ...m,
                            score1: isTeam1 ? parsedVal : m.score1,
                            score2: !isTeam1 ? parsedVal : m.score2
                        };
                    }
                    return m;
                }));
            };

            const runChaosSimulator = () => {
                setMatches(prev => prev.map(m => {
                    // Find if match is already FT
                    const kickoff = new Date(`${m.date}T${m.localTime}:00${m.offset}`);
                    const diffMs = currentTime.getTime() - kickoff.getTime();
                    if (diffMs > 105 * 60 * 1000 || m.actualScore1 !== undefined) return m;

                    const s1 = Math.floor(Math.random() * 4);
                    const s2 = Math.floor(Math.random() * 4);
                    return { ...m, score1: s1, score2: s2 };
                }));
                showNotificationToast("🎲 Chaos Simulated!", "Standings computed. Matches with verified official scores remain preserved.", "success");
            };

            const resetSimulation = () => {
                setMatches(INITIAL_MATCHES);
                showNotificationToast("🔄 Simulation Reset", "All custom predictions cleared.", "info");
            };

            const filteredMatches = useMemo(() => {
                return computedMatches.filter(m => {
                    const matchesGroupSelect = selectedGroup === "ALL" || m.group === selectedGroup;
                    const matchesStadium = stadiumFilter === "ALL" || m.venue === stadiumFilter;
                    
                    let matchesSearch = true;
                    if (searchTeam.trim() !== "") {
                        const term = searchTeam.toLowerCase();
                        const t1 = TEAM_INFO[m.team1]?.name.toLowerCase() || "";
                        const t2 = TEAM_INFO[m.team2]?.name.toLowerCase() || "";
                        matchesSearch = t1.includes(term) || t2.includes(term);
                    }
                    
                    return matchesGroupSelect && matchesStadium && matchesSearch;
                });
            }, [computedMatches, selectedGroup, stadiumFilter, searchTeam]);

            return (
                <div dir={language === 'ar' ? 'rtl' : 'ltr'} class={`relative z-10 transition-all ${language === 'ar' ? 'font-arabic' : 'font-sans'} text-slate-800 dark:text-slate-100`}>
                    
                    {/* Toast Notification Node */}
                    {toast.show && (
                        <div class="fixed bottom-6 right-6 z-50 glass-panel p-4 rounded-2xl shadow-2xl glow-gold border border-amber-500/30 max-w-sm animate-bounce">
                            <div class="flex items-start gap-3">
                                <div class="w-8 h-8 rounded-full bg-amber-500 flex items-center justify-center text-slate-900 font-bold shrink-0">
                                    <i class="fa-solid fa-bell"></i>
                                </div>
                                <div class="flex-1">
                                    <h5 class="text-xs font-bold uppercase tracking-wider text-amber-500">{toast.title}</h5>
                                    <p class="text-xs text-slate-600 dark:text-slate-400 mt-1">{toast.message}</p>
                                </div>
                                <button onClick={() => setToast(prev => ({ ...prev, show: false }))} class="text-slate-500 hover:text-slate-800 dark:hover:text-white">
                                    <i class="fa-solid fa-times text-xs"></i>
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Premium Header Utility Bar */}
                    <div class="bg-gradient-to-r from-emerald-600 via-amber-500 to-indigo-600 py-2 text-center text-[11px] font-semibold tracking-wider text-white flex flex-wrap items-center justify-center gap-x-6 gap-y-1 px-4">

                        <div class="flex items-center space-x-1 font-mono font-bold bg-black/20 px-2.5 py-0.5 rounded-full text-[10px]">
                            <i class="fa-regular fa-clock mr-1 ml-1"></i>
                            <span>{t.yourLocal}: {currentTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' })} ({formattedTimezone})</span>
                        </div>
                    </div>

                    {/* Navigation Header */}
                    <header class="sticky top-0 z-40 glass-panel border-b border-slate-200/80 dark:border-white/10 shadow-lg transition-all">
                        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3.5 flex flex-col lg:flex-row items-center justify-between gap-4">
                            
                            {/* Brand Logo */}

                                    </h1>
                                    <span class="text-[10px] text-cyan-600 dark:text-cyan-400 font-mono tracking-widest uppercase block">{t.nextGenPortal}</span>
                                </div>
                            </div>

                            {/* Navigation Tab Elements */}

                                            class={`px-3 py-1.5 rounded-lg text-xs font-bold transition ${stadiumFilter === 'ALL' ? 'bg-amber-500 text-slate-950 shadow' : 'bg-white dark:bg-slate-950 border border-slate-300 dark:border-none text-slate-700 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white hover:bg-slate-200'}`}
                                        >
                                            {t.allCountries}
                                        </button>
                                        <button 
                                            onClick={() => setStadiumFilter("USA")} 
                                            class={`px-3 py-1.5 rounded-lg text-xs font-bold transition ${stadiumFilter === 'USA' ? 'bg-amber-500 text-slate-950 shadow' : 'bg-white dark:bg-slate-950 border border-slate-300 dark:border-none text-slate-700 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white hover:bg-slate-200'}`}
                                        >
                                            🇺🇸 United States
                                        </button>
                                        <button 
                                            onClick={() => setStadiumFilter("MEX")} 
                                            class={`px-3 py-1.5 rounded-lg text-xs font-bold transition ${stadiumFilter === 'MEX' ? 'bg-amber-500 text-slate-950 shadow' : 'bg-white dark:bg-slate-950 border border-slate-300 dark:border-none text-slate-700 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white hover:bg-slate-200'}`}
                                        >
                                            🇲🇽 Mexico
                                        </button>
                                        <button 
                                            onClick={() => setStadiumFilter("CAN")} 
                                            class={`px-3 py-1.5 rounded-lg text-xs font-bold transition ${stadiumFilter === 'CAN' ? 'bg-amber-500 text-slate-950 shadow' : 'bg-white dark:bg-slate-950 border border-slate-300 dark:border-none text-slate-700 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white hover:bg-slate-200'}`}
                                        >
                                            🇨🇦 Canada
                                        </button>
                                    </div>
                                </div>

                                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                    {STADIUMS
                                        .filter(s => stadiumFilter === "ALL" || s.country === stadiumFilter)
                                        .map(s => (
                                            <div key={s.id} class="glass-panel rounded-2xl border border-slate-300 dark:border-white/10 overflow-hidden shadow-md hover:-translate-y-1 transition duration-300 flex flex-col justify-between bg-white dark:bg-brand-cardBg">
                                                <div>
                                                    <div class="h-32 bg-slate-200 dark:bg-slate-950 relative flex items-center justify-center p-4">
                                                        <div class="absolute inset-0 bg-gradient-to-br from-indigo-900/40 to-slate-200/50 dark:to-brand-darkBg opacity-80"></div>
                                                        
                                                        <svg class="absolute bottom-0 left-0 right-0 h-16 text-slate-100 dark:text-slate-900/40 w-full" viewBox="0 0 100 100" preserveAspectRatio="none">
                                                            <path d="M0,100 C30,40 70,40 100,100 Z" fill="currentColor"></path>
                                                        </svg>

                                                        <div class="relative z-10 text-center">
                                                            <div class="text-3xl mb-1">🏟️</div>
                                                            <span class="text-[9px] font-mono tracking-widest bg-amber-500/20 text-amber-800 dark:text-amber-400 px-2 py-0.5 rounded uppercase font-bold">
                                                                {s.country === 'USA' ? '🇺🇸 USA' : s.country === 'MEX' ? '🇲🇽 MEX' : '🇨🇦 CAN'}
                                                            </span>
                                                        </div>
                                                    </div>

                                                    <div class="p-5">
                                                        <h4 class="font-display font-bold text-slate-900 dark:text-white text-base leading-tight mb-1">{s.name}</h4>
                                                        <span class="text-xs text-slate-600 dark:text-slate-400 block mb-3 font-mono font-bold">{s.city}</span>
                                                        <p class="text-xs text-slate-700 dark:text-slate-300 leading-relaxed mb-4">{s.desc}</p>
                                                    </div>
                                                </div>

                                                <div class="p-5 pt-0 border-t border-slate-100 dark:border-white/5 mt-auto">
                                                    <div class="grid grid-cols-2 gap-2 text-center text-[10px] font-mono py-2 bg-slate-100 dark:bg-slate-950/60 rounded-xl border border-slate-200 dark:border-none">
                                                        <div>
                                                            <span class="text-slate-600 dark:text-slate-400 block uppercase font-bold">{t.capacity}</span>
                                                            <span class="text-slate-900 dark:text-white font-extrabold">{s.capacity}</span>
                                                        </div>
                                                        <div>
                                                            <span class="text-slate-600 dark:text-slate-400 block uppercase font-bold">{t.highlight}</span>
                                                            <span class="text-amber-800 dark:text-amber-400 font-extrabold truncate max-w-[100px] block mx-auto font-sans" title={s.feature}>{s.feature}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        ))
                                    }
                                </div>
                            </div>
                        )}

                        {}
                        {currentTab === "badgemaker" && (
                            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                                <div class="glass-panel p-8 rounded-3xl border border-slate-300 dark:border-white/10 shadow-md bg-white dark:bg-brand-cardBg">
                                    <h3 class="text-2xl font-display font-bold text-slate-900 dark:text-white mb-2">{t.socialTicket}</h3>
                                    <p class="text-xs text-slate-700 dark:text-slate-400 mb-6 font-semibold">{t.socialTicketDesc}</p>
                                    
                                    <div class="space-y-4">
                                        <div>
                                            <label class="block text-xs font-mono text-slate-700 dark:text-slate-400 uppercase tracking-wider mb-2 font-bold">{t.fanName}</label>
                                            <input 
                                                type="text" 
                                                value={fanName}
                                                maxLength="25"
                                                onChange={(e) => setFanName(e.target.value)}
                                                class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-white/10 rounded-xl p-3 text-sm text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-amber-500 font-bold"
                                                placeholder="Enter Supporter Name..."
                                            />
                                        </div>

                                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            <div>
                                                <label class="block text-xs font-mono text-slate-700 dark:text-slate-400 uppercase tracking-wider mb-2 font-bold">{t.supportedTeam}</label>
                                                <select 
                                                    value={favoriteTeam} 
                                                    onChange={(e) => setFavoriteTeam(e.target.value)}
                                                    class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-white/10 rounded-xl p-3 text-sm text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-amber-500 cursor-pointer font-bold"
                                                >
                                                    {Object.keys(TEAM_INFO).map(code => (
                                                        <option key={code} value={code}>
                                                            {TEAM_INFO[code].flag} {TEAM_INFO[code].name}
                                                        </option>
                                                    ))}
                                                </select>
                                            </div>

                                            <div>
                                                <label class="block text-xs font-mono text-slate-700 dark:text-slate-400 uppercase tracking-wider mb-2 font-bold">{t.supporterRole}</label>
                                                <select 
                                                    value={fanTitle} 
                                                    onChange={(e) => setFanTitle(e.target.value)}
                                                    class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-white/10 rounded-xl p-3 text-sm text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-amber-500 cursor-pointer font-bold"
                                                >
                                                    <option value="Tactical Expert">{t.roles["Tactical Expert"]}</option>
                                                    <option value="Pitchside Fanatic">{t.roles["Pitchside Fanatic"]}</option>
                                                    <option value="Local Hero">{t.roles["Local Hero"]}</option>
                                                    <option value="Superfan Ultra">{t.roles["Superfan Ultra"]}</option>
                                                    <option value="Goal Tracker">{t.roles["Goal Tracker"]}</option>
                                                </select>
                                            </div>
                                        </div>

                                        <div>
                                            <label class="block text-xs font-mono text-slate-700 dark:text-slate-400 uppercase tracking-wider mb-2 font-bold">{t.ticketTierSelection}</label>
                                            <div class="grid grid-cols-3 gap-2">
                                                {["Holographic", "VIP Elite", "Press Box"].map(tier => (
                                                    <button
                                                        key={tier}
                                                        type="button"
                                                        onClick={() => setTicketTier(tier)}
                                                        class={`py-2 px-1 rounded-xl text-xs font-extrabold border transition ${ticketTier === tier ? 'bg-amber-500 border-amber-500 text-slate-950 shadow animate-pulse' : 'bg-white dark:bg-slate-950 border-slate-300 dark:border-white/5 text-slate-700 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white hover:bg-slate-100 shadow-sm'}`}
                                                    >
                                                        {tier}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>

                                        <div class="pt-6 border-t border-slate-300 dark:border-white/5">
                                            <button 
                                                onClick={handleBadgeAction}
                                                class="w-full bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-600 hover:to-amber-700 text-slate-950 font-extrabold py-3 rounded-xl text-sm transition shadow-lg flex items-center justify-center space-x-2"
                                            >
                                                <i class="fa-solid fa-qrcode"></i>
                                                <span>{t.downloadPass}</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                {}
                                <div class="flex items-center justify-center">
                                    <div class={`relative w-full max-w-md rounded-3xl bg-gradient-to-br ${TEAM_INFO[favoriteTeam].colors} p-1 shadow-2xl overflow-hidden group select-none`}>
                                        
                                        <div class="absolute inset-0 bg-gradient-to-b from-transparent via-white/20 to-transparent w-full h-1/4 -skew-y-12 animate-scan pointer-events-none z-20"></div>

                                        <div class="bg-brand-darkBg rounded-[22px] p-6 relative overflow-hidden z-10 flex flex-col justify-between min-h-[380px]">
                                            <div class="glow-blob absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-full blur-2xl pointer-events-none"></div>
                                            
                                            {/* Ticket Header */}
                                            <div class="flex items-center justify-between border-b border-white/10 pb-4">
                                                <div>
                                                    <span class="text-[9px] font-mono tracking-widest text-amber-500 uppercase font-bold">FIFA World Cup 2026™</span>
                                                    <h4 class="text-sm font-display font-bold text-white uppercase">Official Supporter Pass</h4>
                                                </div>
                                                <div class="text-2xl">{TEAM_INFO[favoriteTeam].flag}</div>
                                            </div>

                                            {/* Supporter Metrics */}
                                            <div class="my-6 space-y-4 text-left text-slate-100">
                                                <div>
                                                    <span class="text-[9px] font-mono uppercase tracking-wider text-slate-400 block">Fan Name</span>
                                                    <span class="text-xl font-display font-extrabold text-white tracking-wide block">{fanName || "Future Legend"}</span>
                                                </div>

                                                <div class="grid grid-cols-2 gap-4">
                                                    <div>
                                                        <span class="text-[9px] font-mono uppercase tracking-wider text-slate-400 block">Supported Team</span>
                                                        <span class="text-sm font-bold text-white block">
                                                            {TEAM_INFO[favoriteTeam].flag} {TEAM_INFO[favoriteTeam].name}
                                                        </span>
                                                    </div>
                                                    <div>
                                                        <span class="text-[9px] font-mono uppercase tracking-wider text-slate-400 block">Supporter Role</span>
                                                        <span class="text-sm font-bold text-amber-400 block">{t.roles[fanTitle] || fanTitle}</span>
                                                    </div>
                                                </div>

                                                <div class="grid grid-cols-2 gap-4">
                                                    <div>
                                                        <span class="text-[9px] font-mono uppercase tracking-wider text-slate-400 block">Ticket Tier</span>
                                                        <span class="text-xs font-semibold bg-white/5 border border-white/10 px-2 py-0.5 rounded text-cyan-400 inline-block font-mono mt-0.5">
                                                            {ticketTier} ACCESS
                                                        </span>
                                                    </div>
                                                    <div>
                                                        <span class="text-[9px] font-mono uppercase tracking-wider text-slate-400 block">Verification ID</span>
                                                        <span class="text-xs text-slate-300 font-mono">#FWC26-{favoriteTeam}-2026</span>
                                                    </div>
                                                </div>
                                            </div>

                                            {/* Barcode Footer */}
                                            <div class="border-t border-dashed border-white/20 pt-4 flex items-center justify-between gap-4">
                                                <div class="flex-1">
                                                    <div class="text-[8px] font-mono text-slate-400 uppercase">Interactive Barcode</div>
                                                    <div class="flex items-stretch space-x-0.5 h-6 mt-1 overflow-hidden opacity-60">
                                                        <div class="w-1 bg-white"></div>
                                                        <div class="w-2 bg-white"></div>
                                                        <div class="w-0.5 bg-white"></div>
                                                        <div class="w-1.5 bg-white"></div>
                                                        <div class="w-1 bg-white"></div>
                                                        <div class="w-2.5 bg-white"></div>
                                                        <div class="w-0.5 bg-white"></div>
                                                        <div class="w-1 bg-white"></div>
                                                        <div class="w-1.5 bg-white"></div>
                                                        <div class="w-2 bg-white"></div>
                                                        <div class="w-0.5 bg-white"></div>
                                                        <div class="w-1 bg-white"></div>
                                                        <div class="w-1.5 bg-white"></div>
                                                        <div class="w-2 bg-white"></div>
                                                        <div class="w-0.5 bg-white"></div>
                                                        <div class="w-1 bg-white"></div>
                                                    </div>
                                                </div>
                                                
                                                <div class="w-12 h-12 bg-white p-1 rounded-lg shadow flex items-center justify-center">
                                                    <svg class="w-full h-full text-slate-900" viewBox="0 0 24 24" fill="currentColor">
                                                        <path d="M2,2 H8 V8 H2 Z M4,4 V6 H6 V4 Z M16,2 H22 V8 H16 Z M18,4 V6 H20 V4 Z M2,16 H8 V22 H2 Z M4,18 V20 H6 V18 Z M11,11 H13 V13 H11 Z M11,16 H13 V18 H11 Z M16,11 H18 V13 H16 Z M13,20 H15 V22 H13 Z M18,18 H20 V20 H18 Z M20,20 H22 V22 H20 Z M20,16 H22 V18 H20 Z" />
                                                    </svg>
                                                </div>
                                            </div>

                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                    </main>

                    {}
                    <footer class="glass-panel border-t border-slate-300 dark:border-white/10 mt-16 py-12 relative overflow-hidden bg-slate-100 dark:bg-brand-cardBg">
                        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row items-center justify-between gap-6">
                            
                            <div class="text-center md:text-left">
                                <h4 class="text-sm font-display font-bold text-slate-950 dark:text-white tracking-wide animate-pulse">
                                    {t.portalTitle}
                                </h4>
                                <p class="text-xs text-slate-700 dark:text-slate-400 mt-1">
                                    {t.portalDesc}
                                </p>
                            </div>

                            <div class="flex items-center space-x-4 text-xs font-mono">
                                <span class="text-slate-600 dark:text-slate-400 font-bold">Status:</span>
                                <span class="bg-emerald-100 dark:bg-emerald-500/10 text-emerald-800 dark:text-emerald-400 border border-emerald-300 dark:border-emerald-500/30 px-2 py-1 rounded font-bold">{t.statusOperational}</span>
                                <span class="text-slate-400 dark:text-slate-600">•</span>
                                <span class="text-slate-800 dark:text-slate-400 font-bold">{t.kickoffDay}</span>
                            </div>

                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
